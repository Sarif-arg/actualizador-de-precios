<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofino Lanzamiento - Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
  <div class="max-w-3xl mx-auto space-y-4">
    <header class="bg-white rounded-2xl shadow p-4">
      <h1 class="text-2xl font-bold">Filtro inteligente</h1>
      <p class="text-sm text-slate-600">Encontra tu lote perfecto</p>
    </header>

    <section class="bg-white rounded-2xl shadow p-4 space-y-3">
      <div class="grid grid-cols-1 gap-3 hidden" id="searchWrap">
        <input
          id="searchInput"
          type="text"
          placeholder="Busca por ejemplo: sector A1, lote 4, A1 o 4"
          class="w-full border rounded-lg px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2">
        <div class="text-xs font-semibold text-slate-500">Sectores:</div>
        <div class="flex flex-wrap gap-2" id="sectorGroupButtons">
          <button class="chip toggle sector-toggle on" data-group="all">Todos</button>
          <button class="chip toggle sector-toggle" data-group="lago1">Sector Lago 1</button>
          <button class="chip toggle sector-toggle" data-group="lago2">Sector Lago 2</button>
          <button class="chip toggle sector-toggle" data-group="perimetral">Sector Perimetral</button>
          <button class="chip toggle sector-toggle" data-group="plaza">Sector Plaza</button>
          <button class="chip toggle sector-toggle" data-group="central_norte">Sector Central Norte</button>
          <button class="chip toggle sector-toggle" data-group="central_sur">Sector Central Sur</button>
        </div>
      </div>

      <div class="space-y-2">
        <div class="text-xs font-semibold text-slate-500">Visibilidad:</div>
        <div class="flex flex-wrap gap-2">
          <button id="toggleDisponibles" class="chip toggle on">Disponibles</button>
          <button id="toggleNoDisponibles" class="chip toggle">No disponibles</button>
        </div>
      </div>

      <div class="space-y-2">
        <div class="text-xs font-semibold text-slate-500">Elegi tu financiacion:</div>
        <div class="radio-input">
          <label><input type="radio" name="plan-radio" data-plan="12" checked><span>12 cuotas</span></label>
          <label><input type="radio" name="plan-radio" data-plan="24"><span>24 cuotas</span></label>
          <label><input type="radio" name="plan-radio" data-plan="36"><span>36 cuotas</span></label>
          <label><input type="radio" name="plan-radio" data-plan="48"><span>48 cuotas</span></label>
          <label><input type="radio" name="plan-radio" data-plan="60"><span>60 cuotas</span></label>
          <span class="selection"></span>
        </div>
      </div>

      <div class="space-y-2">
        <div class="text-xs font-semibold text-slate-500" id="precioLabel">Filtro de Precio de Lista: USD -</div>
        <div class="range-wrap">
          <input id="precioMax" type="range" min="0" max="100" value="100" class="range" />
        </div>
      </div>

      <div class="flex flex-wrap gap-2">
        <button class="chip chip-gray" id="clearFilters">Limpiar</button>
      </div>
    </section>

    <section class="space-y-2">
      <div id="resultsInfo" class="text-xs text-slate-500"></div>
      <div id="cardsContainer" class="space-y-3"></div>
      <div class="text-center">
        <button id="showMoreBtn" class="chip chip-gray hidden">Mostrar mas</button>
      </div>
    </section>
  </div>

  <style>
    .chip { padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid #e5e7eb; }
    .chip-green { background: #dff6df; color: #216b21; }
    .chip-red { background: #ffd6d6; color: #8a1f1f; }
    .chip-gray { background: #e5e7eb; color: #374151; }
    .toggle { background: #f8fafc; color: #334155; }
    .toggle.on { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .estado-disponible { background: #e9f8e7; color: #216b21; }
    .estado-reservado { background: #fff2c2; color: #7b5a00; }
    .estado-vendido { background: #ffd6d6; color: #8a1f1f; }

    .range-wrap { position: relative; }
    .range {
      appearance: none;
      width: 100%;
      height: 10px;
      border-radius: 9999px;
      background: linear-gradient(90deg, #dbeafe 0%, #e5e7eb 0%);
      outline: none;
      border: 1px solid #e5e7eb;
    }
    .range::-webkit-slider-thumb {
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1d4ed8;
      border: 3px solid #dbeafe;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
    }
    .range::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1d4ed8;
      border: 3px solid #dbeafe;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
    }
    .range::-moz-range-track {
      height: 10px;
      border-radius: 9999px;
      background: transparent;
    }

    .radio-input input { display: none; }
    .radio-input {
      --container_width: 100%;
      --sel: 5;
      position: relative;
      display: flex;
      align-items: center;
      border-radius: 9999px;
      background-color: #fff;
      color: #374151;
      width: var(--container_width);
      overflow: hidden;
      border: 1px solid rgba(53, 52, 52, 0.226);
    }
    .radio-input label {
      width: calc(var(--container_width) / 5);
      padding: 10px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      font-weight: 600;
      letter-spacing: -0.5px;
      font-size: 13px;
    }
    .selection {
      position: absolute;
      height: 100%;
      width: calc(var(--sel) * (var(--container_width) / 5));
      z-index: 0;
      left: 0;
      top: 0;
      transition: .15s ease;
      background-color: #dbeafe;
      border-radius: 9999px;
    }
    .radio-input label:has(input:checked) { color: #1d4ed8; }
    .radio-input label:nth-child(1):has(input:checked) ~ .selection { --sel: 1; }
    .radio-input label:nth-child(2):has(input:checked) ~ .selection { --sel: 2; }
    .radio-input label:nth-child(3):has(input:checked) ~ .selection { --sel: 3; }
    .radio-input label:nth-child(4):has(input:checked) ~ .selection { --sel: 4; }
    .radio-input label:nth-child(5):has(input:checked) ~ .selection { --sel: 5; }
  </style>

  <script>
    const cardsContainer = document.getElementById("cardsContainer");
    const resultsInfo = document.getElementById("resultsInfo");
    const showMoreBtn = document.getElementById("showMoreBtn");
    const searchInput = document.getElementById("searchInput");
    const clearFilters = document.getElementById("clearFilters");
    const toggleDisponibles = document.getElementById("toggleDisponibles");
    const toggleNoDisponibles = document.getElementById("toggleNoDisponibles");
    const precioMax = document.getElementById("precioMax");
    const precioLabel = document.getElementById("precioLabel");
    const planButtons = Array.from(document.querySelectorAll(".radio-input input[data-plan]"));
    const sectorGroupButtons = Array.from(document.querySelectorAll(".sector-toggle"));

    let allItems = [];
    let filteredItems = [];
    let planFilters = new Set(["60"]);
    let selectedSectorGroups = new Set(["all"]);
    let maxPrecio = 0;
    let visibleCount = 4;
    const STEP_RESULTS = 4;
    const sectorGroups = {
      all: null,
      lago1: new Set(["L1"]),
      lago2: new Set(["L2"]),
      perimetral: new Set(["A1", "A2", "A3", "A4"]),
      plaza: new Set(["D1", "D2"]),
      central_norte: new Set(["B1", "B2", "B3", "B4"]),
      central_sur: new Set(["C1", "C2", "C3"])
    };

    function parsePrecio(value) {
      if (!value) return 0;
      return Number(
        value
          .toString()
          .replace(/USD/gi, "")
          .replace(/\./g, "")
          .replace(/,\d{2}\b/g, "")
          .trim()
      ) || 0;
    }

    function formatMoney(value) {
      if (!value) return "";
      return value.toString().replace(/,\d{2}\b/g, "").replace(/\.00\b/g, "");
    }

    function formatUsd(value) {
      const clean = formatMoney(value || "");
      if (!clean) return "";
      if (/^USD/i.test(clean)) return clean;
      return `USD ${clean}`;
    }

    function normalize(text) {
      return (text || "")
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function matchesQuery(item, query) {
      if (!query) return true;
      const searchable = normalize(`sector ${item.sector} lote ${item.numero} ${item.sector} ${item.numero}`);
      const tokens = query.split(/\s+/).filter(Boolean);
      return tokens.every((token) => searchable.includes(token));
    }

    function buildCuotasHtml(item) {
      const cuotaDefs = [
        ["12", item.cuotas_plan_12],
        ["24", item.cuotas_plan_24],
        ["36", item.cuotas_plan_36],
        ["48", item.cuotas_plan_48],
        ["60", item.cuotas_plan_60]
      ];
      return cuotaDefs
        .filter(([, val]) => !!(val && val.toString().trim()))
        .map(([plan, val]) => `<div class="text-sm"><strong>${plan} cuotas de:</strong> ${formatUsd(val)}</div>`)
        .join("");
    }

    function buildRefuerzoHtml(item) {
      const has60 = !!(item.cuotas_plan_60 && item.cuotas_plan_60.toString().trim());
      const refuerzo = has60 ? item.plan_60_refuerzo_aguinaldo : item.plan_48_refuerzo_aguinaldo;
      if (!refuerzo || !refuerzo.toString().trim()) return "";
      const label = has60 ? "Refuerzo plan 60" : "Refuerzo plan 48";
      return `<div class="text-sm"><strong>${label}:</strong> ${formatUsd(refuerzo)}</div>`;
    }

    function renderCards() {
      cardsContainer.innerHTML = "";
      if (filteredItems.length === 0) {
        cardsContainer.innerHTML = "<div class='text-sm text-slate-500'>Sin resultados.</div>";
        resultsInfo.textContent = "Mostrando 0 resultados.";
        showMoreBtn.classList.add("hidden");
        return;
      }

      const visibleItems = filteredItems.slice(0, visibleCount);
      visibleItems.forEach((item) => {
        const estado = normalize(item.estado);
        const has12 = !!(item.cuotas_plan_12 && item.cuotas_plan_12.toString().trim());
        const has24 = !!(item.cuotas_plan_24 && item.cuotas_plan_24.toString().trim());
        const has36 = !!(item.cuotas_plan_36 && item.cuotas_plan_36.toString().trim());
        const has48 = !!(item.cuotas_plan_48 && item.cuotas_plan_48.toString().trim());
        const has60 = !!(item.cuotas_plan_60 && item.cuotas_plan_60.toString().trim());
        const estadoClass = estado ? `estado-${estado}` : "chip-gray";
        const card = document.createElement("div");
        card.className = "bg-white rounded-2xl shadow p-4 space-y-2";
        card.innerHTML = `
          <div class="flex items-center justify-between">
            <div class="font-semibold">Sector ${item.sector} - Lote ${item.numero}</div>
            <span class="chip ${estadoClass}">${item.estado || "Sin estado"}</span>
          </div>
          <div class="text-sm text-slate-600">Superficie: ${item.superficie || ""} m2</div>
          <div class="text-sm"><strong>Precio lista:</strong> ${formatUsd(item.precio_lista || "")}</div>
          <div class="text-sm"><strong>Entrega inicial:</strong> ${formatUsd(item.entrega_inicial || "")}</div>
          <div class="text-sm"><strong>Entrega:</strong> ${item.fecha_entrega || ""}</div>
          ${buildCuotasHtml(item)}
          ${buildRefuerzoHtml(item)}
          <div class="flex flex-wrap gap-2 text-xs">
            <span class="chip ${has12 ? "chip-green" : "chip-red"}">12</span>
            <span class="chip ${has24 ? "chip-green" : "chip-red"}">24</span>
            <span class="chip ${has36 ? "chip-green" : "chip-red"}">36</span>
            <span class="chip ${has48 ? "chip-green" : "chip-red"}">48</span>
            <span class="chip ${has60 ? "chip-green" : "chip-red"}">60</span>
          </div>
        `;
        cardsContainer.appendChild(card);
      });

      resultsInfo.textContent = `Mostrando ${visibleItems.length} de ${filteredItems.length} resultados.`;
      if (visibleCount < filteredItems.length) {
        showMoreBtn.classList.remove("hidden");
      } else {
        showMoreBtn.classList.add("hidden");
      }
    }

    function applyFilters() {
      const query = normalize(searchInput.value);
      const showDisponibles = toggleDisponibles.classList.contains("on");
      const showNoDisponibles = toggleNoDisponibles.classList.contains("on");
      const max = Number(precioMax.value);

      filteredItems = allItems.filter((item) => {
        if (!selectedSectorGroups.has("all")) {
          const itemSector = (item.sector || "").toUpperCase();
          const matchesAnyGroup = Array.from(selectedSectorGroups).some((group) => {
            const groupSet = sectorGroups[group];
            return groupSet && groupSet.has(itemSector);
          });
          if (!matchesAnyGroup) return false;
        }

        if (!matchesQuery(item, query)) return false;

        const estado = normalize(item.estado);
        const isDisponible = estado === "disponible";
        const isNoDisponible = estado === "reservado" || estado === "vendido";
        if (!showDisponibles && isDisponible) return false;
        if (!showNoDisponibles && isNoDisponible) return false;

        if (planFilters.size > 0) {
          for (const plan of planFilters) {
            const key = `cuotas_plan_${plan}`;
            if (!(item[key] && item[key].toString().trim())) return false;
          }
        }

        if (item.precio_num > max) return false;
        return true;
      });

      visibleCount = Math.min(visibleCount, Math.max(STEP_RESULTS, filteredItems.length));
      renderCards();
    }

    function resetVisibleCount() {
      visibleCount = STEP_RESULTS;
    }

    function updateRangeVisual() {
      const max = Number(precioMax.max) || 1;
      const val = Number(precioMax.value) || 0;
      const pct = Math.min(100, Math.max(0, (val / max) * 100));
      precioMax.style.background = `linear-gradient(90deg, #dbeafe ${pct}%, #e5e7eb ${pct}%)`;
    }

    toggleDisponibles.addEventListener("click", () => {
      toggleDisponibles.classList.toggle("on");
      resetVisibleCount();
      applyFilters();
    });

    toggleNoDisponibles.addEventListener("click", () => {
      toggleNoDisponibles.classList.toggle("on");
      resetVisibleCount();
      applyFilters();
    });

    planButtons.forEach((input) => {
      input.addEventListener("change", () => {
        planFilters = new Set([input.dataset.plan]);
        resetVisibleCount();
        applyFilters();
      });
    });

    sectorGroupButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const group = button.dataset.group || "all";

        if (group === "all") {
          selectedSectorGroups = new Set(["all"]);
        } else {
          selectedSectorGroups.delete("all");
          if (selectedSectorGroups.has(group)) selectedSectorGroups.delete(group);
          else selectedSectorGroups.add(group);
          if (selectedSectorGroups.size === 0) selectedSectorGroups = new Set(["all"]);
        }

        sectorGroupButtons.forEach((b) => {
          const key = b.dataset.group || "all";
          if (selectedSectorGroups.has(key)) b.classList.add("on");
          else b.classList.remove("on");
        });

        resetVisibleCount();
        applyFilters();
      });
    });

    precioMax.addEventListener("input", () => {
      precioLabel.textContent = `Filtro de Precio de Lista: USD ${Number(precioMax.value).toLocaleString("es-AR")}`;
      updateRangeVisual();
      resetVisibleCount();
      applyFilters();
    });

    searchInput.addEventListener("input", () => {
      resetVisibleCount();
      applyFilters();
    });

    clearFilters.addEventListener("click", () => {
      planFilters = new Set(["60"]);
      selectedSectorGroups = new Set(["all"]);
      planButtons.forEach((i) => {
        i.checked = i.dataset.plan === "60";
      });
      sectorGroupButtons.forEach((b) => {
        if ((b.dataset.group || "") === "all") b.classList.add("on");
        else b.classList.remove("on");
      });
      toggleDisponibles.classList.add("on");
      toggleNoDisponibles.classList.remove("on");
      searchInput.value = "";
      precioMax.value = maxPrecio;
      precioLabel.textContent = `Filtro de Precio de Lista: USD ${maxPrecio.toLocaleString("es-AR")}`;
      updateRangeVisual();
      resetVisibleCount();
      applyFilters();
    });

    showMoreBtn.addEventListener("click", () => {
      visibleCount += STEP_RESULTS;
      renderCards();
    });

    async function loadData() {
      const response = await fetch("datos_portofino_lanzamiento.json");
      const data = await response.json();
      const items = [];
      for (const [sector, lotes] of Object.entries(data)) {
        lotes.forEach((lote) => {
          const precio_num = parsePrecio(lote.precio_lista || "");
          items.push({ ...lote, sector, precio_num });
        });
      }

      allItems = items;
      maxPrecio = Math.max(...allItems.map((i) => i.precio_num || 0), 0);
      precioMax.max = maxPrecio;
      precioMax.value = maxPrecio;
      precioLabel.textContent = `Filtro de Precio de Lista: USD ${maxPrecio.toLocaleString("es-AR")}`;
      updateRangeVisual();

      const checkedPlan = document.querySelector(".radio-input input[data-plan]:checked");
      planFilters = new Set([checkedPlan ? checkedPlan.dataset.plan : "60"]);
      resetVisibleCount();
      applyFilters();
    }

    loadData();
  </script>
</body>
</html>
